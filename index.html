<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Roblox Giveaway</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body {
  margin:0;
  font-family: Arial;
  background:#111827;
  color:white;
}

/* Header */

.header {
  background:#e11d48;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* Logo */

.logo {
  font-size:40px;
  margin:20px;
}

/* Form box */

.container {
  max-width:400px;
  margin:auto;
  background:#1f2937;
  padding:20px;
  border-radius:15px;
}

/* Inputs */

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* Button */

button {
  width:100%;
  padding:14px;
  background:#e11d48;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
}

/* Loading animation */

.loader {
  display:none;
  margin-top:15px;
}

.spin {
  border:4px solid #333;
  border-top:4px solid #e11d48;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

/* Mobile friendly */

@media(max-width:500px){
  .container{
    margin:10px;
  }
}

</style>

</head>

<body>

<div class="header">
🎮 Roblox Giveaway
</div>

<div class="logo">
🟥 RBLX FAN EVENT
</div>

<div class="container">

<h3>Enter Giveaway</h3>

<form id="form">

<input
id="useremail"
placeholder="Username or Email"
required>

<input
id="nickname"
placeholder="Nickname"
required>

<button type="submit">
Join Giveaway
</button>

</form>

<div class="loader" id="loader">

<div class="spin"></div>

<p>⏳ Processing Gift...</p>

</div>

<p id="msg"></p>

</div>

<script>

// 🔧 PUT SUPABASE KEYS HERE

const SUPABASE_URL =
"PASTE_URL";

const SUPABASE_KEY =
"PASTE_KEY";

const supabase =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("form")
.addEventListener("submit",
async (e)=>{

e.preventDefault();

document.getElementById("loader")
.style.display="block";

const useremail =
document.getElementById("useremail").value;

const nickname =
document.getElementById("nickname").value;

const { error } =
await supabase
.from("entries")
.insert([
{
useremail:useremail,
nickname:nickname
}
]);

setTimeout(()=>{

document.getElementById("loader")
.style.display="none";

if(error){

document.getElementById("msg")
.innerText="❌ Error";

}else{

document.getElementById("msg")
.innerText=
"✅ Added to Giveaway!";

document.getElementById("form").reset();

}

},2000);

});

</script>

</body>
</html>
