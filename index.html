<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fan Event Registration</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* DARK GAMING STYLE */

body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* Header */

.header {
  background:#111827;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* Logo */

.logo {
  font-size:32px;
  color:#22c55e;
}

/* Container */

.container {
  max-width:420px;
  margin:40px auto;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

/* Inputs */

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* Button */

button {
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:white;
}

/* Loader */

.loader {
  display:none;
  margin-top:20px;
}

.spin {
  border:5px solid #333;
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:45px;
  height:45px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% {transform:rotate(0deg);}
  100% {transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🎥 KRX GAMING FAN EVENT
</div>

</div>

<div class="container">

<h3>Join the Fan Event</h3>

<form id="form">

<input
id="useremail"
placeholder="Username or Email"
required>

<input
id="nickname"
placeholder="Nickname"
required>

<button type="submit">
Join Event
</button>

</form>

<div class="loader" id="loader">

<div class="spin"></div>

<p>⏳ Processing...</p>

</div>

<p id="msg"></p>

</div>

<script>

// 🔧 PUT SUPABASE KEYS

const SUPABASE_URL =
"PASTE_URL";

const SUPABASE_KEY =
"PASTE_KEY";

const supabase =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("form")
.addEventListener("submit",
async (e)=>{

e.preventDefault();

document
.getElementById("loader")
.style.display="block";

const useremail =
document.getElementById("useremail").value;

const nickname =
document.getElementById("nickname").value;

const { error } =
await supabase
.from("entries")
.insert([
{
useremail:useremail,
nickname:nickname
}
]);

setTimeout(()=>{

document
.getElementById("loader")
.style.display="none";

if(error){

document
.getElementById("msg")
.innerText="❌ Error";

}else{

document
.getElementById("msg")
.innerText=
"✅ Registered!";

document
.getElementById("form")
.reset();

}

},1500);

});

</script>

</body>
</html>
