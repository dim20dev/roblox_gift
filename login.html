<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

input{
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<h2>🔐 Admin Login</h2>

<input
type="password"
id="pass"
placeholder="Admin Password">

<br>

<button onclick="login()">
Login
</button>

<script>

function login(){

const pass =
document.getElementById("pass").value;

if(pass === "admin123"){

window.location =
"admin.html";

}else{

alert("Wrong password");

}

}

</script>

</body>
</html>
